<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

    <!-- PWA -->
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#6366f1" />
    <meta name="mobile-web-app-capable" content="yes" />

    <!-- Apple PWA -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="NoLimits AI" />
    <link rel="apple-touch-icon" href="/icon-192x192.png" />

    <!-- SEO -->
    <title>NoLimits AI - Chart Bot</title>
    <meta name="description" content="AI-powered chatbot that generates beautiful charts and analytics. Ask questions, get instant visual insights." />
    <meta name="keywords" content="AI, chart bot, analytics, data visualization, chatbot" />

    <!-- Open Graph -->
    <meta property="og:title" content="NoLimits AI - Chart Bot" />
    <meta property="og:description" content="AI-powered chatbot that generates beautiful charts and analytics." />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://chart-bot-liard.vercel.app/" />

    <!-- Icons -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="icon" type="image/png" sizes="192x192" href="/icon-192x192.png" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
    <!-- Register Service Worker -->
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js')
            .then(reg => console.log('SW registered:', reg.scope))
            .catch(err => console.log('SW registration failed:', err));
        });
      }
    </script>
  </body>
</html>
